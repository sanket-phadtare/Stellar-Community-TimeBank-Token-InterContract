name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_CONTRACT_ID: ${{ secrets.VITE_CONTRACT_ID }}
          VITE_TOKEN_CONTRACT_ID: ${{ secrets.VITE_TOKEN_CONTRACT_ID }}
          VITE_RPC_URL: ${{ secrets.VITE_RPC_URL }}
          VITE_NETWORK_PASSPHRASE: ${{ secrets.VITE_NETWORK_PASSPHRASE }}